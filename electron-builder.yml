appId: com.binsoy.monolith
productName: Monolith
directories:
  buildResources: build
files:
  - out/**
  - package.json
asar: true
artifactName: Monolith-Setup-${version}.${ext}
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
publish:
  provider: github
  owner: binsoy69
  repo: monolith
  releaseType: draft
